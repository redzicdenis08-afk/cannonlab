name: probe-smoke
cannon:
  file: probe-one-dispenser.schem
  origin:
    x: 0
    y: 0
    z: 0
  # Redstone block is pulsed immediately west of the east-facing dispenser.
  fire-input:
    x: 5
    y: 1
    z: 1
  fire-pulse-ticks: 2
limits:
  enforce-dispenser-limit: true
target:
  type: dry
  distance: 20
  width: 5
  height: 5
  layers: 1
  spacing: 3
run:
  shots: 1
  warmup-ticks: 20
  max-shot-ticks: 120
  quiet-ticks: 10
  shutdown-when-finished: true
