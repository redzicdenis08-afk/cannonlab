name: ec-mixed-course-smoke
cannon:
  file: probe-four-dispenser.schem
  origin: {x: 0, y: 0, z: 0}
  fire-mode: redstone
  fire-input: {x: 1, y: 2, z: 1}
  fire-pulse-ticks: 4
limits:
  enforce-dispenser-limit: true
target:
  type: dry
  material: cobblestone
  direction: east
  distance: 5
  width: 9
  height: 6
  layers: 1
  spacing: 3
  regeneration:
    enabled: false
  stages:
    - name: dry-baseline
      type: dry
      material: cobblestone
      width: 9
      height: 6
      layers: 1
      spacing: 3
      gap-after: 3
      regeneration: {enabled: false}
    - name: watered-baseline
      type: watered
      material: cobblestone
      width: 9
      height: 6
      layers: 1
      spacing: 3
      gap-after: 3
      regeneration: {enabled: false}
    - name: checker-filter
      type: filter
      material: cobblestone
      width: 9
      height: 6
      layers: 1
      spacing: 3
      gap-after: 3
      regeneration: {enabled: false}
    - name: watered-hotdog
      type: hotdog
      material: cobblestone
      alternate-material: obsidian
      width: 9
      height: 6
      layers: 1
      spacing: 3
      gap-after: 3
      hotdog-band-width: 2
      regeneration:
        enabled: true
        delay-ticks: 20
        interval-ticks: 5
        max-blocks-per-cycle: 16
    - name: staggered-pillars
      type: pillars
      material: cobblestone
      width: 9
      height: 7
      layers: 2
      spacing: 3
      gap-after: 0
      pillar-spacing: 3
      regeneration:
        enabled: true
        delay-ticks: 30
        interval-ticks: 5
        max-blocks-per-cycle: 12
run:
  shots: 3
  warmup-ticks: 20
  max-shot-ticks: 260
  quiet-ticks: 100
  shutdown-when-finished: true
