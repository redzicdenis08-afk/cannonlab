name: durable-dry-pressure
cannon:
  file: probe-one-dispenser.schem
  origin: {x: -16, y: 0, z: 0}
  fire-mode: tnt-probe
  probe-tnt-origin: {x: 2, y: 1, z: 0}
  probe-tnt-fuse-ticks: 80
limits:
  enforce-dispenser-limit: true
target:
  type: dry
  material: obsidian
  direction: east
  distance: 3
  width: 1
  height: 1
  y-offset: 1
  layers: 1
  spacing: 3
  regeneration:
    enabled: false
  durability:
    mode: auto
    expiration-ticks: 1200
    only-tnt: true
    hit-radius: 4.0
    materials:
      obsidian: 4
run:
  shots: 1
  volleys-per-shot: 4
  volley-interval-ticks: 100
  warmup-ticks: 20
  max-shot-ticks: 520
  quiet-ticks: 80
  shutdown-when-finished: true
