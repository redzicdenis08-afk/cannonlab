name: hotdog-defense
cannon:
  file: probe-four-dispenser.schem
  origin: {x: 0, y: 0, z: 0}
  fire-mode: redstone
  fire-input: {x: 1, y: 2, z: 1}
  fire-pulse-ticks: 4
limits:
  enforce-dispenser-limit: true
target:
  type: hotdog
  material: cobblestone
  alternate-material: obsidian
  direction: east
  distance: 5
  width: 9
  height: 6
  layers: 2
  spacing: 3
  hotdog-band-width: 2
  regeneration:
    enabled: true
    delay-ticks: 30
    interval-ticks: 5
    max-blocks-per-cycle: 12
run:
  shots: 5
  warmup-ticks: 20
  max-shot-ticks: 240
  quiet-ticks: 100
  shutdown-when-finished: true
