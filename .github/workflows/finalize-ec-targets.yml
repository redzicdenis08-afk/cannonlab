name: Finalize EC target support

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'feat/ec-readiness-lab'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Repair helper quoting and apply transforms
        run: |
          rm -f finalize-error.txt
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.agent/finalize.py')
          lines = path.read_text(encoding='utf-8').splitlines()
          inside = False
          for index, line in enumerate(lines):
              if line.startswith('    new_course_start = """'):
                  lines[index] = line.replace('= """', "= r'''", 1)
                  inside = True
              elif inside and line == ' """':
                  lines[index] = " '''"
                  break
          else:
              raise SystemExit('unable to repair new_course_start quoting')
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          set +e
          python3 .agent/finalize.py > finalize-error.txt 2>&1
          status=$?
          set -e
          if [[ "$status" -ne 0 ]]; then
            cat finalize-error.txt
            git config user.name 'CannonLab Builder'
            git config user.email 'cannonlab@users.noreply.github.com'
            git add -f finalize-error.txt
            git commit -m 'Capture exact target transform failure'
            git push origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi

      - name: Compile exact target support
        run: gradle clean build --stacktrace

      - name: Commit finalized target engine
        run: |
          rm -f .agent/finalize.py finalize-error.txt .github/workflows/finalize-ec-targets.yml
          rmdir .agent 2>/dev/null || true
          git config user.name 'CannonLab Builder'
          git config user.email 'cannonlab@users.noreply.github.com'
          git add -A
          git commit -m 'Add exact defense schematic targets and per-stage regen caps'
          git push origin HEAD:${{ github.head_ref }}
