name: Exact Sakura Runtime

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sakura-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout CannonLab
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build CannonLab plugin
        run: gradle clean build --stacktrace

      - name: Build exact public Sakura 26.1.2
        run: bash scripts/build-sakura-26.1.2.sh

      - name: Run ten shots on Sakura 26.1.2
        env:
          CANNONLAB_SERVER_JAR: ${{ github.workspace }}/.sakura-26.1.2.jar
          CANNONLAB_SERVER_LABEL: Sakura 26.1.2 public branch
          CANNONLAB_SCENARIO: probe-cloud-stress.yml
        run: bash scripts/cloud-smoke.sh

      - name: Upload Sakura build and runtime evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CannonLab-Sakura-26.1.2-${{ github.run_number }}
          path: |
            lab-artifacts/**
            sakura-build-artifacts/**
          if-no-files-found: warn
          retention-days: 30
