name: Apply Litematica block-entity fix

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/litematic-field-parity'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Apply region-local block-entity fix
        run: python3 .agent/fix-litematic-block-entities.py
      - name: Verify static conversion and build
        run: |
          python3 scripts/test-negative-litematic.py
          python3 -m py_compile scripts/schem-audit.py scripts/test-negative-litematic.py
          gradle clean build --stacktrace
      - name: Commit fix
        run: |
          rm -f .agent/fix-litematic-block-entities.py .github/workflows/apply-litematic-block-entities.yml
          rmdir .agent 2>/dev/null || true
          git config user.name 'CannonLab Builder'
          git config user.email 'cannonlab@users.noreply.github.com'
          git add -A
          git commit -m 'Fix region-local Litematica block entities'
          git push origin HEAD:${{ github.head_ref }}
