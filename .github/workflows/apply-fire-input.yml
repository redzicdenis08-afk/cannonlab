name: Apply fire-input telemetry

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/ec-readiness-lab'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Add explicit fire-input event
        run: python3 .agent/add-fire-input.py

      - name: Compile telemetry fix
        run: gradle clean build --stacktrace

      - name: Commit telemetry fix
        run: |
          rm -f .agent/add-fire-input.py .github/workflows/apply-fire-input.yml
          rmdir .agent 2>/dev/null || true
          git config user.name 'CannonLab Builder'
          git config user.email 'cannonlab@users.noreply.github.com'
          git add -A
          git commit -m 'Record explicit cannon fire-input timing'
          git push origin HEAD:${{ github.head_ref }}
