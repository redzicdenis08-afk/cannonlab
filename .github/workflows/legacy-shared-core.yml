name: Legacy Shared Core Audit

on:
  pull_request:
    paths:
      - 'scripts/legacy-shared-core-audit.py'
      - 'scripts/legacy-shared-core-envelope.py'
      - 'scripts/legacy-shared-assembly-audit.py'
      - 'scripts/test-legacy-shared-core-audit.py'
      - 'scripts/test-legacy-shared-core-envelope.py'
      - 'scripts/test-legacy-shared-assembly-audit.py'
      - 'scripts/test-legacy-shared-assembly-review.py'
      - 'profiles/corpus/**'
      - 'evidence/public-corpus/**'
      - 'docs/LEGACY_SHARED_CORE_AUDIT.md'
      - '.github/workflows/legacy-shared-core.yml'
  workflow_dispatch:
    inputs:
      fetch_public_sources:
        description: 'Fetch pinned Formal and Pred, derive shared static evidence, and delete raw files'
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  shared-core-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PYTHONHASHSEED: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile shared static tools
        run: |
          python -m py_compile \
            scripts/legacy-shared-core-audit.py \
            scripts/legacy-shared-core-envelope.py \
            scripts/legacy-shared-assembly-audit.py \
            scripts/test-legacy-shared-core-audit.py \
            scripts/test-legacy-shared-core-envelope.py \
            scripts/test-legacy-shared-assembly-audit.py \
            scripts/test-legacy-shared-assembly-review.py

      - name: Run metadata, boundary, envelope, assembly, and review regressions
        run: |
          mkdir -p lab-artifacts/shared-core-contract
          set -o pipefail
          {
            python scripts/test-legacy-shared-core-audit.py
            python scripts/test-legacy-shared-core-envelope.py
            python scripts/test-legacy-shared-assembly-audit.py
            python scripts/test-legacy-shared-assembly-review.py
          } 2>&1 | tee lab-artifacts/shared-core-contract/regressions.log

      - name: Verify pinned global transform contract
        run: |
          python - <<'PY' | tee lab-artifacts/shared-core-contract/transform-contract.log
          import json
          from pathlib import Path

          evidence = json.loads(
              Path('evidence/public-corpus/cosmicreborn-global-alignment-v1.json').read_text(encoding='utf-8')
          )
          correction = evidence['formal_pred_correction']
          assert correction['degrees'] == 270, correction
          assert correction['translation'] == [-649, 0, 357], correction
          assert correction['exact_kind_overlap_count'] == 2731, correction
          assert evidence['truth_boundary']['ec_ready'] is False, evidence
          print('Formal/Pred shared-core input transform remains pinned to exact evidence.')
          PY

      - name: Upload contract diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-core-contract-diagnostics
          path: lab-artifacts/shared-core-contract
          if-no-files-found: warn

  controlled-shared-core:
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.fetch_public_sources) }}
    needs: shared-core-contract
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHONHASHSEED: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Strictly fetch and audit pinned public sources
        run: |
          mkdir -p lab-artifacts/shared-core-run
          python scripts/strict-fetch-public-cannon-corpus.py \
            profiles/corpus/public-cannon-sources-v1.json \
            --output-directory lab-artifacts/public-cannon-cache \
            --mode fetch \
            --write-lock lab-artifacts/shared-core-run/public-cannon-lock-v1.json \
            --json-out lab-artifacts/shared-core-run/fetch-report.json \
            > /dev/null

      - name: Audit Formal and Pred shared regions and assemblies
        run: |
          root=lab-artifacts/public-cannon-cache/public-cannon-sources-v1/files
          common="--first-id cosmicreborn-formal \
            --first $root/cosmicreborn-formal/FORMAL.schematic \
            --second-id cosmicreborn-pred \
            --second $root/cosmicreborn-pred/PRED.schematic \
            --turns 3 \
            --translation=-649,0,357"
          python scripts/legacy-shared-core-audit.py \
            $common \
            --chunk-limit 160 \
            --minimum-component-size 8 \
            --json-out lab-artifacts/shared-core-run/formal-pred-shared-core.json \
            > /dev/null
          python scripts/legacy-shared-core-envelope.py \
            $common \
            --minimum-component-size 8 \
            --max-support-layers 8 \
            --max-added-support 4096 \
            --json-out lab-artifacts/shared-core-run/formal-pred-support-envelope.json \
            > /dev/null
          python scripts/legacy-shared-assembly-audit.py \
            $common \
            --minimum-functional-count 8 \
            --chunk-limit 160 \
            --max-shared-support-nodes 100000 \
            --near-closed-boundary-limit 16 \
            --max-boundary-examples 64 \
            --json-out lab-artifacts/shared-core-run/formal-pred-shared-assemblies.json \
            > /dev/null
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path('lab-artifacts/shared-core-run')
          core = json.loads((root / 'formal-pred-shared-core.json').read_text(encoding='utf-8'))
          envelope = json.loads((root / 'formal-pred-support-envelope.json').read_text(encoding='utf-8'))
          assemblies = json.loads((root / 'formal-pred-shared-assemblies.json').read_text(encoding='utf-8'))
          assert core['status'] == 'PASS', core
          assert core['overlap']['same_kind_position_count'] == 2731, core
          assert core['overlap']['proven_metadata_equivalent_position_count'] == 2693, core
          assert core['overlap']['classification_counts']['metadata_conflict'] == 9, core
          assert core['overlap']['classification_counts']['same_kind_unresolved_metadata'] == 29, core
          assert core['summary']['promotion_eligible_component_count'] == 0, core
          assert envelope['status'] == 'PASS', envelope
          assert envelope['summary']['reported_component_count'] == core['summary']['reported_component_count'], envelope
          assert envelope['summary']['promotion_eligible_component_count'] == 0, envelope
          assert assemblies['status'] == 'PASS', assemblies
          assert assemblies['node_inventory']['proven_equivalent_functional_count'] == 2693, assemblies
          assert assemblies['summary']['promotion_eligible_assembly_count'] == 0, assemblies
          review_count = assemblies['summary']['review_classification_counts'].get(
              'NEAR_CLOSED_STATIC_REVIEW_CANDIDATE', 0
          )
          assert review_count >= 1, assemblies
          near = [
              row for row in assemblies['assemblies']
              if row['review_classification'] == 'NEAR_CLOSED_STATIC_REVIEW_CANDIDATE'
          ]
          assert all(row['status'] == 'OPEN_SHARED_ASSEMBLY' for row in near), near
          assert all(row['promotion_eligible'] is False for row in near), near
          assert all(row['boundary_examples'] for row in near), near
          assert assemblies['truth_boundary']['near_closed_review_candidate_is_a_proven_module'] is False, assemblies
          assert assemblies['truth_boundary']['runtime_semantics_confirmed'] is False, assemblies
          assert assemblies['truth_boundary']['ec_ready'] is False, assemblies
          print('Formal/Pred static component, envelope, assembly, and near-closed review audits completed without promotion.')
          PY

      - name: Copy audit reports and remove raw third-party files
        if: always()
        run: |
          if [ -d lab-artifacts/public-cannon-cache/public-cannon-sources-v1/audits ]; then
            cp -R \
              lab-artifacts/public-cannon-cache/public-cannon-sources-v1/audits \
              lab-artifacts/shared-core-run/audits
          fi
          rm -rf lab-artifacts/public-cannon-cache/public-cannon-sources-v1/files

      - name: Prove raw files are absent
        if: always()
        run: test ! -d lab-artifacts/public-cannon-cache/public-cannon-sources-v1/files

      - name: Upload derived evidence only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formal-pred-shared-core-audit
          path: lab-artifacts/shared-core-run
          if-no-files-found: warn
