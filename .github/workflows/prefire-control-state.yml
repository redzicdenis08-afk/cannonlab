name: Pre-Fire Control State

on:
  pull_request:
    paths:
      - 'src/**'
      - 'build.gradle*'
      - 'settings.gradle*'
      - 'scripts/cloud-smoke.sh'
      - 'scripts/assert-results.py'
      - 'scripts/assert-prefire-control-state.py'
      - 'scripts/scenario-integrity-audit.py'
      - 'scripts/test-prefire-control-state.py'
      - 'scenarios/probe-prefire-control-state.yml'
      - 'cannons/probe-button-field.schem.b64'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prefire-control-state:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.2.1'
      - name: Build CannonLab
        run: gradle clean build --stacktrace
      - name: Test control-state scenario audit
        run: python3 scripts/test-prefire-control-state.py
      - name: Run pre-fire control-state fixture
        env:
          CANNONLAB_MC_VERSION: '26.1.2'
          CANNONLAB_SCENARIO: probe-prefire-control-state.yml
          CANNONLAB_SERVER_LABEL: Paper 26.1.2 pre-fire control state
          CANNONLAB_EXPECTED_SHOTS: '1'
          CANNONLAB_MIN_TNT_PER_SHOT: '1'
          CANNONLAB_MIN_EXPLOSIONS_PER_SHOT: '1'
          CANNONLAB_EXPECTED_LIFETIME: '79'
          CANNONLAB_LIFETIME_TOLERANCE: '0'
          CANNONLAB_MAX_SELF_DAMAGE_BLOCKS: '20'
          CANNONLAB_TIMEOUT_SECONDS: '480'
          CANNONLAB_ARENA_RADIUS_X: '24'
          CANNONLAB_ARENA_RADIUS_Y: '16'
          CANNONLAB_ARENA_RADIUS_Z: '16'
        run: bash scripts/cloud-smoke.sh
      - name: Assert apply, settle, verify, then fire order
        run: |
          RUN_DIR="$(find lab-artifacts/results -name run-summary.json -printf '%h\n' | head -n 1)"
          test -n "$RUN_DIR"
          python3 scripts/assert-prefire-control-state.py "$RUN_DIR" \
            --name arm-known-dispenser-state \
            --expected-before 'minecraft:dispenser[facing=east,triggered=false]' \
            --expected-after 'minecraft:dispenser[facing=east,triggered=true]'
          python3 scripts/assert-prefire-control-state.py "$RUN_DIR" \
            --name release-known-dispenser-state \
            --expected-before 'minecraft:dispenser[facing=east,triggered=true]' \
            --expected-after 'minecraft:dispenser[facing=east,triggered=false]'
      - name: Upload control-state evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CannonLab-prefire-control-state-${{ github.run_number }}
          path: lab-artifacts/**
          if-no-files-found: error
          retention-days: 30
