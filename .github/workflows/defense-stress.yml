name: Professional Defense Stress

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  defense-stress:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: multi-range
            scenario: multi-tnt-range.yml
            shots: '10'
            min_forward: ''
            min_peak: '20'
            min_peak_mean: '25'
            min_layer: '1'
            max_peak: ''
            require_regen: 'false'
            min_regen: '1'
          - label: plugin-regen
            scenario: plugin-regen-wall.yml
            shots: '5'
            min_forward: '0.05'
            min_peak: '25'
            min_peak_mean: ''
            min_layer: '1'
            max_peak: ''
            require_regen: 'true'
            min_regen: '25'
          - label: fluid-regen
            scenario: fluid-regen-defense.yml
            shots: '5'
            min_forward: ''
            min_peak: ''
            min_peak_mean: ''
            min_layer: ''
            max_peak: '6'
            require_regen: 'false'
            min_regen: '1'
          - label: hotdog
            scenario: hotdog-defense.yml
            shots: '5'
            min_forward: ''
            min_peak: ''
            min_peak_mean: ''
            min_layer: ''
            max_peak: '0'
            require_regen: 'false'
            min_regen: '1'
          - label: pillars
            scenario: pillar-defense.yml
            shots: '5'
            min_forward: ''
            min_peak: '6'
            min_peak_mean: ''
            min_layer: '1'
            max_peak: ''
            require_regen: 'false'
            min_regen: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.2.1'

      - name: Build CannonLab
        run: gradle clean build --stacktrace

      - name: Run ${{ matrix.label }} defense scenario
        env:
          CANNONLAB_SCENARIO: ${{ matrix.scenario }}
          CANNONLAB_SERVER_LABEL: Paper 26.1.2 defense ${{ matrix.label }}
          CANNONLAB_EXPECTED_SHOTS: ${{ matrix.shots }}
          CANNONLAB_STRICT_SINGLE_TNT: 'false'
          CANNONLAB_MIN_TNT_PER_SHOT: '4'
          CANNONLAB_MIN_EXPLOSIONS_PER_SHOT: '4'
          CANNONLAB_EXPECTED_LIFETIME: '79'
          CANNONLAB_LIFETIME_TOLERANCE: '0'
          CANNONLAB_MIN_FORWARD_TRAVEL: ${{ matrix.min_forward }}
          CANNONLAB_MAX_TARGET_MISS_DISTANCE: '7.0'
          CANNONLAB_MIN_TARGET_PEAK_DESTROYED: ${{ matrix.min_peak }}
          CANNONLAB_MIN_TARGET_PEAK_MEAN: ${{ matrix.min_peak_mean }}
          CANNONLAB_MIN_LAYER_BREACHED: ${{ matrix.min_layer }}
          CANNONLAB_REQUIRE_REGEN: ${{ matrix.require_regen }}
          CANNONLAB_MIN_REGEN_RESTORED: ${{ matrix.min_regen }}
          CANNONLAB_TIMEOUT_SECONDS: '600'
          CANNONLAB_ARENA_RADIUS_X: '32'
          CANNONLAB_ARENA_RADIUS_Y: '24'
          CANNONLAB_ARENA_RADIUS_Z: '24'
        run: bash scripts/cloud-smoke.sh

      - name: Verify protection ceiling
        if: matrix.max_peak != ''
        env:
          MAX_PEAK: ${{ matrix.max_peak }}
        run: |
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          report = json.loads(Path('lab-artifacts/physics-fingerprint.json').read_text())
          stats = report.get('target_peak_destroyed') or {}
          observed = float(stats.get('max', 0))
          maximum = float(os.environ['MAX_PEAK'])
          assert observed <= maximum, (observed, maximum, report)
          print(f'Protection ceiling passed: peak damage {observed} <= {maximum}.')
          PY

      - name: Upload ${{ matrix.label }} evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CannonLab-defense-${{ matrix.label }}-${{ github.run_number }}
          path: lab-artifacts/**
          if-no-files-found: warn
          retention-days: 30
