name: Cannon Field Parity

on:
  pull_request:
    paths:
      - 'src/**'
      - 'build.gradle*'
      - 'settings.gradle*'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'scripts/cloud-smoke.sh'
      - 'scripts/assert-results.py'
      - 'scripts/schem-audit.py'
      - 'scripts/test-negative-litematic.py'
      - 'scenarios/field-parity-button.yml'
      - 'audit-fixtures/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  field-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.2.1'
      - name: Build CannonLab
        run: gradle clean build --stacktrace
      - name: Verify negative Litematica region ordering
        run: python3 scripts/test-negative-litematic.py
      - name: Run paste-empty-settle-fill-button sequence
        env:
          CANNONLAB_MC_VERSION: '26.1.2'
          CANNONLAB_SCENARIO: field-parity-button.yml
          CANNONLAB_SERVER_LABEL: Paper 26.1.2 field-parity button
          CANNONLAB_EXPECTED_SHOTS: '3'
          CANNONLAB_MIN_TNT_PER_SHOT: '1'
          CANNONLAB_MIN_EXPLOSIONS_PER_SHOT: '1'
          CANNONLAB_EXPECTED_LIFETIME: '79'
          CANNONLAB_LIFETIME_TOLERANCE: '0'
          CANNONLAB_MAX_SELF_DAMAGE_BLOCKS: '20'
          CANNONLAB_TIMEOUT_SECONDS: '480'
          CANNONLAB_ARENA_RADIUS_X: '24'
          CANNONLAB_ARENA_RADIUS_Y: '16'
          CANNONLAB_ARENA_RADIUS_Z: '16'
        run: bash scripts/cloud-smoke.sh
      - name: Assert real button and delayed fill telemetry
        run: |
          python3 - <<'PY'
          import csv
          import json
          from pathlib import Path

          summaries = list(Path('lab-artifacts/results').rglob('run-summary.json'))
          traces = list(Path('lab-artifacts/results').rglob('causal-events.csv'))
          assert len(summaries) == 1, summaries
          assert len(traces) == 3, traces
          summary = json.loads(summaries[0].read_text())
          assert summary['shots_completed'] == 3, summary
          for trace in traces:
              with trace.open(newline='') as handle:
                  rows = list(csv.DictReader(handle))
              inputs = [row for row in rows if row['event'] == 'FIRE_INPUT']
              dispenses = [row for row in rows if row['event'] == 'DISPENSE']
              assert len(inputs) == 1, (trace, inputs)
              assert 'mode=button' in inputs[0]['details'], inputs[0]
              assert len(dispenses) == 1, (trace, dispenses)
              assert int(dispenses[0]['tick']) >= int(inputs[0]['tick']), (inputs[0], dispenses[0])
          print('Field-faithful button workflow passed three independent shots.')
          PY
      - name: Upload field-parity evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CannonLab-field-parity-${{ github.run_number }}
          path: lab-artifacts/**
          if-no-files-found: error
          retention-days: 30
