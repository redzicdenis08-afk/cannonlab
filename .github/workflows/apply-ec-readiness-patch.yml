name: Apply EC readiness patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/ec-readiness-lab'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Diagnose and apply audited patch
        run: |
          set +e
          git apply --check --verbose .agent/ec-readiness.patch > apply-error.txt 2>&1
          status=$?
          set -e
          if [[ "$status" -ne 0 ]]; then
            cat apply-error.txt
            git config user.name 'CannonLab Builder'
            git config user.email 'cannonlab@users.noreply.github.com'
            git add -f apply-error.txt
            git commit -m 'Capture EC readiness patch failure'
            git push origin HEAD:${{ github.head_ref }}
            exit "$status"
          fi
          git apply .agent/ec-readiness.patch
          rm -f .agent/ec-readiness.patch .agent/apply.log apply-error.txt .github/workflows/apply-ec-readiness-patch.yml
          rmdir .agent 2>/dev/null || true

      - name: Compile local sources
        run: |
          python3 -m py_compile scripts/assert-results.py
          gradle clean build --stacktrace

      - name: Commit applied upgrade
        run: |
          git config user.name 'CannonLab Builder'
          git config user.email 'cannonlab@users.noreply.github.com'
          git add -A
          git commit -m 'Apply mixed EC course and self-damage telemetry'
          git push origin HEAD:${{ github.head_ref }}
