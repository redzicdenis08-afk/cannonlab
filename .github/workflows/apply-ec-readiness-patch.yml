name: Apply EC readiness patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/ec-readiness-lab'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply deterministic source transforms
        run: python3 .agent/upgrade.py

      - name: Compile upgraded sources
        run: |
          python3 -m py_compile scripts/assert-results.py
          gradle clean build --stacktrace

      - name: Commit applied upgrade
        run: |
          rm -f .agent/ec-readiness.patch .agent/upgrade.py apply-error.txt .github/workflows/apply-ec-readiness-patch.yml
          rmdir .agent 2>/dev/null || true
          git config user.name 'CannonLab Builder'
          git config user.email 'cannonlab@users.noreply.github.com'
          git add -A
          git commit -m 'Apply mixed EC course and self-damage telemetry'
          git push origin HEAD:${{ github.head_ref }}
