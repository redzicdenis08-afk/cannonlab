name: Apply EC readiness patch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/ec-readiness-lab'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply audited patch
        run: |
          git apply --check .agent/ec-readiness.patch
          git apply .agent/ec-readiness.patch
          rm -f .agent/ec-readiness.patch .github/workflows/apply-ec-readiness-patch.yml
          rmdir .agent 2>/dev/null || true

      - name: Compile local sources
        run: |
          python3 -m py_compile scripts/assert-results.py
          gradle clean build --stacktrace

      - name: Commit applied upgrade
        run: |
          git config user.name 'CannonLab Builder'
          git config user.email 'cannonlab@users.noreply.github.com'
          git add -A
          git commit -m 'Apply mixed EC course and self-damage telemetry'
          git push origin HEAD:${{ github.head_ref }}
