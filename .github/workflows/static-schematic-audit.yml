name: Static Schematic Audit

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  schematic-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decode deterministic schematic fixtures
        run: |
          mkdir -p .audit-input audit-artifacts
          base64 --decode cannons/probe-one-dispenser.schem.b64 \
            > .audit-input/probe-one-dispenser.schem
          base64 --decode cannons/probe-four-dispenser.schem.b64 \
            > .audit-input/probe-four-dispenser.schem
          base64 --decode audit-fixtures/overflow-129.schem.b64 \
            > .audit-input/overflow-129.schem
          base64 --decode audit-fixtures/probe-one-dispenser.litematic.b64 \
            > .audit-input/probe-one-dispenser.litematic
          sha256sum .audit-input/* | tee audit-artifacts/input-sha256.txt

      - name: Audit legal cannon fixtures
        run: |
          python3 scripts/schem-audit.py \
            .audit-input/probe-one-dispenser.schem \
            --chunk-limit 128 \
            --expect-dispensers 1 \
            --expect-aligned-max 1 \
            --json-out audit-artifacts/probe-one.json \
            >audit-artifacts/probe-one.stdout.json \
            2>audit-artifacts/probe-one.stderr.txt

          python3 scripts/schem-audit.py \
            .audit-input/probe-four-dispenser.schem \
            --chunk-limit 128 \
            --expect-dispensers 4 \
            --expect-aligned-max 4 \
            --json-out audit-artifacts/probe-four.json \
            >audit-artifacts/probe-four.stdout.json \
            2>audit-artifacts/probe-four.stderr.txt

          python3 - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('audit-artifacts/probe-four.json').read_text())
          assert report['status'] == 'PASS', report
          assert report['dispensers']['count'] == 4, report
          assert report['dimensions'] == {
              'width': 8, 'height': 4, 'length': 3, 'volume': 96
          }, report['dimensions']
          assert not report['support_failures'], report['support_failures']
          print('Four-dispenser cannon fixture is structurally legal.')
          PY

      - name: Audit and deterministically convert signed Litematica fixture
        run: |
          for output in a b; do
            python3 scripts/schem-audit.py \
              .audit-input/probe-one-dispenser.litematic \
              --chunk-limit 160 \
              --expect-format litematic \
              --expect-dispensers 1 \
              --convert-sponge-out ".audit-input/probe-one-dispenser-${output}.schem" \
              --output-data-version 3465 \
              --allow-data-version-retag \
              --json-out "audit-artifacts/probe-litematic-${output}.json" \
              >"audit-artifacts/probe-litematic-${output}.stdout.json" \
              2>"audit-artifacts/probe-litematic-${output}.stderr.txt"
          done
          cmp .audit-input/probe-one-dispenser-a.schem \
            .audit-input/probe-one-dispenser-b.schem
          sha256sum .audit-input/probe-one-dispenser-*.schem \
            | tee audit-artifacts/litematic-conversion-sha256.txt

          python3 scripts/schem-audit.py \
            .audit-input/probe-one-dispenser-a.schem \
            --chunk-limit 160 \
            --expect-format sponge-v2 \
            --expect-dispensers 1 \
            --expect-aligned-max 1 \
            --json-out audit-artifacts/probe-litematic-converted.json \
            >audit-artifacts/probe-litematic-converted.stdout.json \
            2>audit-artifacts/probe-litematic-converted.stderr.txt

          python3 - <<'PY'
          import json
          from pathlib import Path
          source = json.loads(Path('audit-artifacts/probe-litematic-a.json').read_text())
          converted = json.loads(Path('audit-artifacts/probe-litematic-converted.json').read_text())
          assert source['status'] == converted['status'] == 'PASS', (source, converted)
          assert source['dimensions'] == converted['dimensions'] == {
              'width': 2, 'height': 1, 'length': 1, 'volume': 2
          }, (source['dimensions'], converted['dimensions'])
          assert source['offset'] == [4, 0, 0], source['offset']
          assert source['regions'][0]['size']['x'] == -2, source['regions']
          assert source['dispensers']['count'] == converted['dispensers']['count'] == 1
          assert source['block_entities']['explicit'] == 1
          assert converted['block_entities']['explicit'] == 1
          assert converted['data_version'] == 3465
          print('Signed Litematica decode and deterministic Sponge v2 conversion are stable.')
          PY

      - name: Prove chunk alignment changes legality
        run: |
          set +e
          python3 scripts/schem-audit.py \
            .audit-input/overflow-129.schem \
            --chunk-limit 128 \
            --expect-dispensers 129 \
            --expect-aligned-max 129 \
            --json-out audit-artifacts/overflow-129.json \
            >audit-artifacts/overflow-129.stdout.json \
            2>audit-artifacts/overflow-129.stderr.txt
          code=$?
          set -e
          echo "$code" > audit-artifacts/overflow-129.exit-code.txt
          if [[ "$code" -ne 2 ]]; then
            cat audit-artifacts/overflow-129.stderr.txt >&2 || true
            echo "Expected aligned overflow fixture to fail with exit 2, got $code" >&2
            exit 1
          fi
          python3 - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('audit-artifacts/overflow-129.json').read_text())
          assert report['status'] == 'FAIL', report
          assert report['dispensers']['count'] == 129, report['dispensers']
          assert report['dispensers']['aligned_max'] == 129, report['dispensers']
          assert report['dispensers']['best_alignment']['max'] == 65, report['dispensers']
          assert report['dispensers']['best_alignment']['offset_x'] == 8, report['dispensers']
          assert report['dispensers']['worst_alignment']['max'] == 129, report['dispensers']
          assert not report['support_failures'], report['support_failures']
          print('Chunk-alignment legality fingerprint is stable and correctly detected.')
          PY

      - name: Reject corrupted and truncated schematic input
        run: |
          head -c 120 .audit-input/probe-one-dispenser.schem > .audit-input/truncated.schem
          cp .audit-input/probe-one-dispenser.schem .audit-input/corrupted.schem
          printf '\x00\xff\x00\xff' | dd of=.audit-input/corrupted.schem bs=1 seek=20 conv=notrunc status=none
          for bad in truncated corrupted; do
            set +e
            python3 scripts/schem-audit.py ".audit-input/${bad}.schem" \
              >"audit-artifacts/${bad}.stdout.json" \
              2>"audit-artifacts/${bad}.stderr.json"
            code=$?
            set -e
            echo "$code" > "audit-artifacts/${bad}.exit-code.txt"
            if [[ "$code" -ne 3 ]]; then
              echo "Expected ${bad} schematic to be rejected with exit 3, got $code" >&2
              exit 1
            fi
          done

      - name: Upload static audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CannonLab-static-schematic-audit-${{ github.run_number }}
          path: audit-artifacts/**
          if-no-files-found: warn
          retention-days: 30
