name: Apply native button press

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'fix/litematic-field-parity'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Install native ButtonBlock press
        run: python3 .agent/use-native-button-press.py
      - name: Compile API-only plugin
        run: gradle clean build --stacktrace
      - name: Commit native button support
        run: |
          rm -f .agent/use-native-button-press.py .github/workflows/apply-native-button.yml
          rmdir .agent 2>/dev/null || true
          git config user.name 'CannonLab Builder'
          git config user.email 'cannonlab@users.noreply.github.com'
          git add -A
          git commit -m 'Use native Minecraft button press semantics'
          git push origin HEAD:${{ github.head_ref }}
