name: Cannon Forge

on:
  pull_request:
    paths:
      - 'knowledge/**'
      - 'skills/cannon-forge/**'
      - 'scripts/cannon-forge.py'
      - 'scripts/cannon-operator.py'
      - 'scripts/cannon-variant-search.py'
      - 'scripts/cannon-factory-budget.py'
      - 'scripts/analyze-output-corridor.py'
      - 'scripts/wall-breach-intelligence.py'
      - 'scripts/run-forge-campaign.ps1'
      - 'scripts/test-cannon-forge.py'
      - 'scripts/test-cannon-operator.py'
      - 'scripts/test-cannon-variant-search.py'
      - 'scripts/test-cannon-factory-budget.py'
      - 'scripts/test-forge-campaign-performance.py'
      - 'scripts/test-output-corridor.py'
      - 'scripts/test-wall-breach-intelligence.py'
      - '.github/workflows/cannon-forge.yml'
  push:
    branches: [main]
    paths:
      - 'knowledge/**'
      - 'skills/cannon-forge/**'
      - 'scripts/cannon-forge.py'
      - 'scripts/cannon-operator.py'
      - 'scripts/cannon-variant-search.py'
      - 'scripts/cannon-factory-budget.py'
      - 'scripts/analyze-output-corridor.py'
      - 'scripts/wall-breach-intelligence.py'
      - 'scripts/run-forge-campaign.ps1'
      - 'scripts/test-cannon-forge.py'
      - 'scripts/test-cannon-operator.py'
      - 'scripts/test-cannon-variant-search.py'
      - 'scripts/test-cannon-factory-budget.py'
      - 'scripts/test-forge-campaign-performance.py'
      - 'scripts/test-output-corridor.py'
      - 'scripts/test-wall-breach-intelligence.py'
      - '.github/workflows/cannon-forge.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Compile forge tools
        run: python -m py_compile scripts/cannon-forge.py scripts/cannon-operator.py scripts/cannon-variant-search.py scripts/cannon-factory-budget.py scripts/analyze-output-corridor.py scripts/wall-breach-intelligence.py scripts/test-cannon-forge.py scripts/test-cannon-operator.py scripts/test-cannon-variant-search.py scripts/test-cannon-factory-budget.py scripts/test-forge-campaign-performance.py scripts/test-output-corridor.py scripts/test-wall-breach-intelligence.py
      - name: Verify source registry and scenario contracts
        run: python scripts/test-cannon-forge.py
      - name: Verify fast operator, cache and tier contracts
        run: |
          python scripts/test-cannon-operator.py
          python scripts/test-cannon-variant-search.py
          python scripts/test-cannon-factory-budget.py
          python scripts/test-forge-campaign-performance.py
      - name: Verify measured output corridor contracts
        run: python scripts/test-output-corridor.py
      - name: Verify wall-breach contracts and diagnoses
        run: python scripts/test-wall-breach-intelligence.py