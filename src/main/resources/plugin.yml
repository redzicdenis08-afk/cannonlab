name: CannonLab
version: ${version}
main: io.github.redzicdenis08afk.cannonlab.CannonLabPlugin
api-version: '1.21'
authors: [Denis]
description: Automated isolated cannon test laboratory.
softdepend: [WorldEdit, FastAsyncWorldEdit]
commands:
  cannonlab:
    description: CannonLab control command
    usage: /cannonlab <status|smoke|run|cancel>
    aliases: [cl]
    permission: cannonlab.admin
  p:
    description: ExtremeCraft-style isolated plot command shim
    usage: /p <tntfill|gui>
    permission: cannonlab.admin
  bonetool:
    description: ExtremeCraft-style sand and obsidian placement tool
    usage: /bonetool
    permission: cannonlab.admin
permissions:
  cannonlab.admin:
    default: op
