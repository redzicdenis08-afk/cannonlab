arena:
  world: world
  origin:
    x: 0
    y: 100
    z: 0
  # The complete disposable test box around the origin.
  radius-x: 256
  radius-y: 96
  radius-z: 96
limits:
  # Current user-reported ExtremeCraft cap. Override for other servers or conservative audits.
  dispensers-per-chunk: 160
telemetry:
  output-directory: results
  causal:
    enabled: true
    capture-redstone: true
    capture-dispense: true
    capture-pistons: true
    capture-entity-add: true
    capture-tnt-prime: true
    # Fluid events are extremely noisy on large watered cannons. Enable only for fluid probes.
    capture-fluid: false
