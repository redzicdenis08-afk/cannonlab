  - id: block-entity-paste-cap
    probe: Paste schematics with increasing block-entity counts while staying below 160 dispensers per chunk.
  - id: exact-merge-level
    probe: Fire a calibrated overlapping TNT pair and compare entity count plus post-merge momentum.
  - id: exact-tnt-spread
    probe: Record at least 100 dispenser spawns at a fixed coordinate and compare X/Y/Z variance.
  - id: durable-expiration
    probe: Hit the same obsidian block three times, wait controlled intervals, then measure whether the fourth hit breaks it.
